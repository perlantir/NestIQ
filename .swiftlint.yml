# SwiftLint config — Quotient
# Strict Swift: no force-unwrap in production, small files, explicit names.
# See CONTRIBUTING (TBD Session 5) for full style narrative.

included:
  - App
  - Packages

excluded:
  - .build
  - Packages/*/.build
  - "**/DerivedData/**"
  - "**/.swiftpm/**"
  - design

disabled_rules:
  - todo                          # TODO comments are fine during build-out
  - trailing_comma                # conflicts with Xcode's default formatter
  - opening_brace                 # Xcode format handles this
  - blanket_disable_command       # we use whole-file disables on data tables

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

line_length:
  warning: 140
  error: 180
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 900

function_body_length:
  warning: 120
  error: 200

cyclomatic_complexity:
  warning: 20
  error: 30

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 4

identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 60
    error: 80
  excluded:
    # Common math + finance variable conventions used throughout this engine.
    - id
    - x
    - y
    - n
    - i
    - j
    - k
    - p
    - r           # rate
    - t           # term
    - m           # compounding periods per year
    - c           # case (test data)
    - d           # date
    - e           # error
    - f           # function value
    - h           # numerical-derivative step
    - dF          # numerical derivative
    - to
    - in
    - pv
    - fv
    - pmt
    - af          # amount financed
    - lf          # loan with fees
    - lp          # loan with PMI
    - lr          # loan with recast
    - q1
    - q2
    - dc          # date components
    - dp          # drop period
    - cf          # cash flow
    - fm          # function-mid value
    - pmi
    - mip

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

function_parameter_count:
  warning: 8
  error: 10

force_cast: error
force_try: error
force_unwrapping:
  severity: error

reporter: "xcode"
