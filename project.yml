# project.yml — xcodegen manifest for Quotient
#
# After any change to this file, regenerate the project with:
#     xcodegen generate
#
# Edit here, not in Quotient.xcodeproj directly. The .xcodeproj is checked in
# so clones don't need xcodegen installed to build — but any edit made through
# Xcode's UI that isn't reflected back here will be overwritten on the next
# regenerate.

name: Quotient
options:
  bundleIdPrefix: ai.perlantir
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.42.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    # SwiftLint build phase needs to read files outside the build directory
    # (the source tree + .swiftlint.yml). Disable per-script sandboxing for it.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # TODO: set DEVELOPMENT_TEAM once Apple Developer enrollment (Perlantir
    # AI Studio) completes. Simulator-only builds run without signing.
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      ENABLE_TESTABILITY: YES
      GCC_OPTIMIZATION_LEVEL: "0"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule

packages:
  QuotientFinance:
    path: Packages/QuotientFinance
  QuotientCompliance:
    path: Packages/QuotientCompliance
  QuotientPDF:
    path: Packages/QuotientPDF
  QuotientNarration:
    path: Packages/QuotientNarration

targets:
  Quotient:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
    resources:
      - path: App/Resources/Assets.xcassets
      - path: App/Resources/Fonts
        type: folder
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Quotient
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: YES
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIAppFonts:
          - SourceSerif4-Regular.ttf
          - SourceSerif4-It.ttf
          - SourceSerif4-Semibold.ttf
          - SourceSerif4-SemiboldIt.ttf
        NSContactsUsageDescription: Quickly add borrowers from your contacts.
        NSFaceIDUsageDescription: Unlock Quotient securely with Face ID.
        NSCameraUsageDescription: Capture your company logo or professional photo.
        NSPhotoLibraryUsageDescription: Choose your company logo or professional photo.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.perlantir.quotient
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: QuotientFinance
      - package: QuotientCompliance
      - package: QuotientPDF
      - package: QuotientNarration
    preBuildScripts:
      - name: SwiftLint
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --quiet --strict
          else
            echo "warning: SwiftLint not installed — install via 'brew install swiftlint'"
          fi
        basedOnDependencyAnalysis: false
